name: Build & deploy

# Régénère index.html (à la racine, servi par GitHub Pages) dès qu'une source
# change, puis le commit sur main. Déclenchable aussi manuellement.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-index
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Régénère index.html depuis src/
        run: node src/build.mjs

      - name: Commit si index.html a changé
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "index.html inchangé — rien à committer."
          else
            git commit -m "build: régénère index.html depuis src [skip ci]"
            git push
          fi
